<script>
    const translations = {
        ko: {
            questions: [
                "잠들기가 어렵다.", "자다가 자꾸 깬다.", "너무 일찍 깨서 다시 잠들기 어렵다.",
                "현재 수면 패턴에 만족하는가?", "수면 문제가 일상을 얼마나 방해하는가?",
                "주변에서 당신의 수면 문제를 눈치채는가?", "현재 수면 문제로 얼마나 스트레스를 받는가?"
            ],
            options: ["전혀 없음", "가벼움", "보통", "심함", "매우 심함"],
            results: ["정상", "가벼운 불면증", "중등도 불면증", "심한 불면증"],
            tips: "📍 K102호 상담실에서 '쿨잠 꾸러미'를 수령하세요!",
            alert: "모든 문항에 답변하고 학번을 입력해주세요."
        },
        en: {
            questions: [
                "Difficulty falling asleep", "Difficulty staying asleep", "Waking up too early",
                "Satisfaction with sleep pattern", "Interference with daily functioning",
                "Noticeability to others", "Worry/distress about sleep"
            ],
            options: ["None", "Mild", "Moderate", "Severe", "Very Severe"],
            results: ["Normal", "Mild Insomnia", "Moderate Insomnia", "Severe Insomnia"],
            tips: "📍 Visit K102 to receive your 'Cool Sleep Kit'!",
            alert: "Please answer all questions and enter your Student ID."
        },
        vn: {
            questions: [
                "Khó đi vào giấc ngủ", "Hay bị thức giấc giữa đêm", "Thức dậy quá sớm",
                "Mức độ hài lòng với giấc ngủ", "Ảnh hưởng đến sinh hoạt",
                "Người khác có nhận thấy không?", "Mức độ lo lắng về giấc ngủ"
            ],
            options: ["Không", "Nhẹ", "Trung bình", "Nặng", "Rất nặng"],
            results: ["Bình thường", "Mất ngủ nhẹ", "Mất ngủ trung bình", "Mất ngủ nghiêm trọng"],
            tips: "📍 Hãy đến phòng K102 để nhận 'Bộ quà ngủ ngon' nhé!",
            alert: "Vui lòng trả lời tất cả các câu hỏi và nhập mã số sinh viên."
        }
    };

    let currentLang = 'ko';
    let answers = new Array(7).fill(null);

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = '';
        translations[currentLang].questions.forEach((q, qIdx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `<div class="question-text">${qIdx + 1}. ${q}</div>`;
            
            const optDiv = document.createElement('div');
            optDiv.className = 'options';
            
            translations[currentLang].options.forEach((opt, oIdx) => {
                const optBtn = document.createElement('div');
                optBtn.className = `option ${answers[qIdx] === oIdx ? 'selected' : ''}`;
                optBtn.innerText = opt;
                optBtn.onclick = () => {
                    answers[qIdx] = oIdx;
                    renderQuestions();
                };
                optDiv.appendChild(optBtn);
            });
            qDiv.appendChild(optDiv);
            container.appendChild(qDiv);
        });
    }

    function switchLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.toLowerCase().includes(lang === 'ko' ? '한국어' : lang === 'en' ? 'english' : 'tiếng'));
        });
        renderQuestions();
    }

    // 결과 계산 함수
    function calculateResult() {
        const studentId = document.getElementById('student-id').value.trim();
        
        // 유효성 검사: 학번 미입력 또는 미답변 문항 체크
        if (!studentId || answers.includes(null)) {
            alert(translations[currentLang].alert);
            return;
        }
        
        const totalScore = answers.reduce((a, b) => a + b, 0);
        
        // 화면 전환
        document.getElementById('survey-page').style.display = 'none';
        document.getElementById('result-page').style.display = 'block';
        document.getElementById('score-display').innerText = totalScore;

        let resIdx = 0;
        if (totalScore <= 7) resIdx = 0;
        else if (totalScore <= 14) resIdx = 1;
        else if (totalScore <= 21) resIdx = 2;
        else resIdx = 3;

        document.getElementById('res-interpret').innerText = translations[currentLang].results[resIdx];
        document.getElementById('res-tips').innerText = translations[currentLang].tips;

        // 데이터 전송 실행
        sendDataToSheet(totalScore, studentId);
    }

    // 데이터 전송 함수 (분리하여 선언)
    async function sendDataToSheet(score, studentId) {
        // 주의: 반드시 본인의 Apps Script 웹 앱 URL로 교체하세요!
        const scriptUrl = https://script.google.com/macros/library/d/15ceiDG16I4zwQ-pGlHtLjOJ_c7pivXDld54eb_5RQvJVWp7jVECaZsu3/1;
        
        const data = {
            studentId: studentId,
            score: score,
            answers: answers
        };

        try {
            // mode: 'no-cors'는 응답을 읽을 수는 없지만 전송은 성공합니다.
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            console.log('데이터 전송 시도 완료');
        } catch (error) {
            console.error('전송 중 오류 발생:', error);
        }
    }

    renderQuestions();
</script>
